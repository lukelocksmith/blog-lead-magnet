name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        env:
          TAG_REF: ${{ github.ref }}
        run: echo "version=${TAG_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Build ZIP
        env:
          PLUGIN_VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p build/blogcta
          rsync -av --exclude='.git' --exclude='.github' --exclude='build' --exclude='node_modules' --exclude='.DS_Store' ./ build/blogcta/
          cd build && zip -r "blogcta-${PLUGIN_VERSION}.zip" blogcta/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/blogcta-${{ steps.version.outputs.version }}.zip
          generate_release_notes: true
          draft: false
          prerelease: false
